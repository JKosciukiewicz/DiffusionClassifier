model:
  class_path: lightning_models.lightning_diffusion_mlp.LightningDiffusionClassifier
  init_args:
    num_classes: 13
    embedding_dim: 668
    loss_weighted: True
    loss_pos_weight: 12
    alpha: 0.05
    dropout_rate: 0.2
    lr: 1e-4
    residual: True
    activation_fn: torch.nn.GELU
    size: 'dino_small'
    results_path: "./results_test.csv"

data:
  class_path: datamodules.bbbc021_data_module.BBBC021DataModule
  init_args:
    data_dir: '/Users/jkosciukiewicz/Developer/UJ/Projects/HCS-DFC/data/BBBC021' # Update data dir to match your environment
    mask_uncertain: True

trainer:
  max_epochs: 60
  check_val_every_n_epoch: 3
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "hcs-dfc-gridsearch-timesteps-diffusion-bbbc-gelu"
      name: "bbbc-cp-xsm-diffusion"
      tags: [ "diffusion", "bbbc", "cp" ]
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: './checkpoints/bbbc_cp/diffusion/xsm'
        filename: 'epoch={epoch}-val_loss={validation_loss:.2f}'
        monitor: 'validation_loss'
        mode: 'min'
        save_top_k: 6
        every_n_epochs: 10
        save_last: true