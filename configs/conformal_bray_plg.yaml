model:
  class_path: lightning_models.lightning_conformal_mlp.LightningConformalClassifier
  init_args:
    num_classes: 30
    embedding_dim: 4643
    loss_weighted: True
    loss_pos_weight: 5.21
    alpha: 0.05
    dropout_rate: 0.2
    lr: 1e-5
    size: "md"
    residual: True
    activation_fn: torch.nn.ReLU
    results_path: "./results_test.csv"

data:
  class_path: datamodules.bray_data_module.BrayDataModule
  init_args:
    data_dir: '/net/pr2/projects/plgrid/plggicv/jk/datasets/bray_features/gigadb'
    mask_uncertain: True

trainer:
  max_epochs: 60
  check_val_every_n_epoch: 5
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "hcs-dfc-mlp-final-bray-cp"
      name: "bray-cp-conformal"
      tags: [ "mlp", "bray", "cp" ]
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: './checkpoints_fixed/bray_cp/mlp/md'
        filename: 'epoch={epoch}-val_roc_auc={validation_roc_auc:.2f}'
        monitor: 'validation_roc_auc'
        mode: 'min'
        save_top_k: 3
        every_n_epochs: 1
        save_last: true