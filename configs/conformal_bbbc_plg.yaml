model:
  class_path: lightning_models.lightning_conformal_mlp.LightningConformalClassifier
  init_args:
    num_classes: 13
    embedding_dim: 668
    loss_weighted: True
    loss_pos_weight: 12
    alpha: 0.05
    dropout_rate: 0.2
    lr: 1e-4
    size: "xsm"
    residual: True
    activation_fn: torch.nn.GELU
    results_path: "./results/bray_dino/diffusion/results_0.05csv"

data:
  class_path: datamodules.bbbc021_data_module.BBBC021DataModule
  init_args:
    data_dir: '/net/pr2/projects/plgrid/plggicv/jk/datasets/BBBC021'
    mask_uncertain: True

trainer:
  max_epochs: 60
  check_val_every_n_epoch: 3
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "hcs-dfc-mlp-final-bbbc-cp"
      name: "bbbc-cp-xsm-diffusion"
      tags: [ "diffusion", "bbbc", "cp" ]
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: './checkpoints/bbbc_dino/diffusion'
        filename: '{epoch}-{validation_loss:.2f}'
        monitor: 'validation_loss'
        mode: 'min'
        save_top_k: 0
        every_n_epochs: 70
        save_last: true