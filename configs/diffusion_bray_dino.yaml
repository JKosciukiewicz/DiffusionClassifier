model:
  class_path: lightning_models.lightning_diffusion_mlp.LightningDiffusionClassifier
  init_args:
    num_classes: 30
    embedding_dim: 384
    loss_weighted: True
    loss_pos_weight: 5.21
    alpha: 0.05
    dropout_rate: 0.2
    lr: 1e-4
    size: 'dino_small'
    residual: True
    activation_fn: torch.nn.GELU
    results_path: "./results/bray_dinodiffusion/results_0.05csv"

data:
  class_path: datamodules.image_feature_data_module.ImageFeatureDataModule
  init_args:
    split_col: 'hier_split_0'
    data_csv_path: '/Users/jkosciukiewicz/Developer/UJ/Projects/HCS-DFC/data/bray_dino/bray_dino_complete.csv'
    mask_uncertain: True
    validation_split_val: "cal"

trainer:
  max_epochs: 60
  check_val_every_n_epoch: 1
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "hcs-dfc-gridsearch-bray-dino-diffusion"
      name: "bray-dino-xsm-diffusion"
      tags: [ "diffusion", "bray", "dino" ]
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: './checkpoints/bray_dino/diffusion'
        filename: 'epoch={epoch}-val_loss={val_loss:.2f}'
        monitor: 'val_loss'
        mode: 'min'
        save_top_k: 3
        every_n_epochs: 70
        save_last: true
