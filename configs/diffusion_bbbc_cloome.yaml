model:
  class_path: lightning_models.lightning_diffusion_mlp.LightningDiffusionClassifier
  init_args:
    num_classes: 13
    embedding_dim: 512
    loss_weighted: True
    loss_pos_weight: 12
    alpha: 0.5
    dropout_rate: 0.2
    lr: 1e-4
    size: "dino_small"
    residual: True
    activation_fn: torch.nn.GELU
    results_path: "./results/bray_dino/diffusion/results_0.05csv"

data:
  class_path: datamodules.image_feature_data_module.ImageFeatureDataModule
  init_args:
    split_col: 'split'
    data_csv_path: '/Users/jkosciukiewicz/Developer/UJ/Projects/HCS-DFC/data/bbbc_cloome/bbbc_cloome_dataset.csv'
    mask_uncertain: True

trainer:
  max_epochs: 60
  check_val_every_n_epoch: 3
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "hcs-dfc-diffusion-final-bbbc-cloome"
      name: "bbbc-cp-xsm-diffusion"
      tags: [ "diffusion", "bbbc", "cloome" ]
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: './checkpoints/bbbc_cloomegrid_search_diffusion_bbbc.py/diffusion'
        filename: '{epoch}-{validation_loss:.2f}'
        monitor: 'validation_loss'
        mode: 'min'
        save_top_k: 0
        every_n_epochs: 70
        save_last: false