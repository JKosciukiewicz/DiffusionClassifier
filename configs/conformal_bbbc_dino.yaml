model:
  class_path: lightning_models.lightning_conformal_mlp.LightningConformalClassifier
  init_args:
    num_classes: 13
    embedding_dim: 384
    loss_weighted: True
    loss_pos_weight: 12
    alpha: 0.5
    dropout_rate: 0.3
    lr: 1e-4
    size: "dino_small"
    residual: True
    activation_fn: torch.nn.GELU
    results_path: "./results/bbbc_dino_/conformal/results_test.csv"

data:
  class_path: datamodules.image_feature_data_module.ImageFeatureDataModule
  init_args:
    split_col: 'split'
    data_csv_path: '/Users/jkosciukiewicz/Developer/UJ/Projects/HCS-DFC/data/bbbc_dino/bbbc_dino_dataset.csv'
    mask_uncertain: True

trainer:
  max_epochs: 30
  check_val_every_n_epoch: 5
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "hcs-dfc-diffusion-final-bbbc-dino"
      name: "bbbc-dino-conformal"
      tags: [ "conformal", "dino", "bbbc" ]
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: './checkpoints/bbbc_dino_roc_train/conformal/'
        filename: '{epoch}-{validation_loss:.2f}'
        monitor: 'validation_loss'
        mode: 'min'
        save_top_k: 6
        every_n_epochs: 5
        save_last: true
