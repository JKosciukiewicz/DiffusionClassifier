model:
  class_path: lightning_models.lightning_conformal_mlp.LightningConformalClassifier
  init_args:
    num_classes: 30
    embedding_dim: 4643
    loss_weighted: True
    loss_pos_weight: 5.21
    alpha: 0.5
    dropout_rate: 0.2
    lr: 1e-4
    size: "xlg"
    residual: True
    activation_fn: torch.nn.ReLU
    results_path: "./results_test.csv"

data:
  class_path: datamodules.bray_data_module.BrayDataModule
  init_args:
    data_dir: '/Users/jkosciukiewicz/Developer/UJ/Projects/HCS-DFC/data/gigadb'
    mask_uncertain: True

trainer:
  max_epochs: 3
  check_val_every_n_epoch: 1
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "hcs-dfc-test"
      name: "bray-cp-lg-conformal"
      tags: [ "conformal", "dino", "bbbc" ]
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: './checkpoints_roc_test/bray/conformal/lg'
        filename: 'epoch={epoch}-val_loss={validation_loss:.2f}'
        monitor: 'validation_loss'
        mode: 'min'
        save_top_k: 6
        every_n_epochs: 10
        save_last: true
