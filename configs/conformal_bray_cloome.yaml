model:
  class_path: lightning_models.lightning_conformal_mlp.LightningConformalClassifier
  init_args:
    num_classes: 30
    embedding_dim: 512
    loss_weighted: True
    loss_pos_weight: 5.71
    dropout_rate: 0.2
    alpha: 0.05
    lr: 1e-4
    size: 'dino_small'
    residual: True
    activation_fn: torch.nn.GELU
    results_path: "./results/bray_cloome/conformal/results_test.csv"

data:
  class_path: datamodules.image_feature_data_module.ImageFeatureDataModule
  init_args:
    split_col: 'hier_split_0'
    data_csv_path: '/Users/jkosciukiewicz/Developer/UJ/Projects/HCS-DFC/data/bray_cloome/Bray_CLOOME_complete.csv'
    mask_uncertain: True

trainer:
  max_epochs: 90
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "gridearch-bbbc-conformal-cloome"
      name: "bray-cloome-lg-conformal"
      tags: [ "conformal", "dino", "bbbc" ]
  check_val_every_n_epoch: 1
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: './checkpoints/bray_cloome/conformal/lg'
        filename: 'epoch={epoch}-val_loss={val_loss:.2f}'
        monitor: 'val_loss'
        mode: 'min'
        save_top_k: 3
        every_n_epochs: 90
        save_last: true
