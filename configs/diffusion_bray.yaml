model:
  class_path: lightning_models.lightning_diffusion_mlp.LightningDiffusionClassifier
  init_args:
    num_classes: 30
    embedding_dim: 4643
    loss_weighted: False
    loss_pos_weight: 5.21
    alpha: 0.05
    dropout_rate: 0.2
    lr: 1e-4
    residual: True
    activation_fn: torch.nn.GELU
    size: 'md'
    results_path: "./results/bray/results_0.05csv"

data:
  class_path: datamodules.bray_data_module.BrayDataModule
  init_args:
    data_dir: '/Users/jkosciukiewicz/Developer/UJ/Projects/HCS-DFC/data/gigadb'
    mask_uncertain: True # Update data dir to match your environment

trainer:
  max_epochs: 60
  check_val_every_n_epoch: 1
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "hcs-dfc-test"
      name: "bray-cp-test-diffusion-md"
      tags: [ "diffusion", "bray", "cp" ]
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: './checkpoints_fixed/bray_cp/diffusion/md'
        filename: 'epoch={epoch}-val_roc_auc={validation_roc_auc:.2f}'
        monitor: 'validation_roc_auc'
        mode: 'min'
        save_top_k: 3
        every_n_epochs: 5
        save_last: true
